<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F5F7"/>
      <stop offset="100%" stop-color="#E8E8ED"/>
    </linearGradient>
    <linearGradient id="glass" x1="4" y1="4" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="edge" x1="4" y1="4" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#D1D1D6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="refract" cx="18" cy="16" r="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- 3D shadow filter for WiFi arcs -->
    <filter id="arc-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#002266" flood-opacity="0.3"/>
    </filter>

    <!-- Arc stroke gradients — darker Apple blue with depth -->
    <linearGradient id="arc1" x1="14" y1="26" x2="50" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A8EF6" stop-opacity="0.3"/>
      <stop offset="20%" stop-color="#0040DD" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0033BB" stop-opacity="1"/>
      <stop offset="80%" stop-color="#0040DD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3A8EF6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="arc2" x1="20" y1="32" x2="44" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A8EF6" stop-opacity="0.25"/>
      <stop offset="25%" stop-color="#0040DD" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#0033BB" stop-opacity="0.95"/>
      <stop offset="75%" stop-color="#0040DD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3A8EF6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="arc3" x1="26" y1="38" x2="38" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4D9BF7" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#0040DD" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#0033BB" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#0040DD" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4D9BF7" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="dot-grad" cx="32" cy="46" r="3.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0033BB"/>
      <stop offset="60%" stop-color="#0040DD"/>
      <stop offset="100%" stop-color="#3A8EF6" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <!-- Outer shadow for 3D depth -->
  <rect width="64" height="64" rx="14" fill="none" filter="url(#arc-shadow)"/>

  <!-- Light background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Clean glass pane -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#glass)" stroke="url(#edge)" stroke-width="0.75"/>

  <!-- Light refraction highlight -->
  <rect x="4" y="4" width="56" height="28" rx="12" fill="url(#refract)"/>

  <!-- Inner glow edge -->
  <rect x="5" y="5" width="54" height="54" rx="11" fill="none" stroke="white" stroke-opacity="0.35" stroke-width="0.5"/>

  <!-- WiFi shadow layer (dark offset below — 3D depth) -->
  <path d="M14 30a25.5 25.5 0 0 1 36 0" fill="none" stroke="#002266" stroke-opacity="0.18" stroke-width="3" stroke-linecap="round"/>
  <path d="M20 36a16 16 0 0 1 24 0" fill="none" stroke="#002266" stroke-opacity="0.15" stroke-width="3" stroke-linecap="round"/>
  <path d="M26 42a7.5 7.5 0 0 1 12 0" fill="none" stroke="#002266" stroke-opacity="0.12" stroke-width="3" stroke-linecap="round"/>

  <!-- WiFi highlight layer (white offset above — raised/embossed) -->
  <path d="M14 27a25.5 25.5 0 0 1 36 0" fill="none" stroke="white" stroke-opacity="0.65" stroke-width="2" stroke-linecap="round"/>
  <path d="M20 33a16 16 0 0 1 24 0" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
  <path d="M26 39a7.5 7.5 0 0 1 12 0" fill="none" stroke="white" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>

  <!-- WiFi main arcs — darker blue gradient -->
  <path d="M14 28a25.5 25.5 0 0 1 36 0" fill="none" stroke="url(#arc1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M20 34a16 16 0 0 1 24 0" fill="none" stroke="url(#arc2)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M26 40a7.5 7.5 0 0 1 12 0" fill="none" stroke="url(#arc3)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center dot with 3D -->
  <circle cx="32" cy="48" r="2.5" fill="#002266" fill-opacity="0.15"/>
  <circle cx="32" cy="46" r="2.5" fill="url(#dot-grad)"/>
  <circle cx="31.2" cy="45.2" r="0.9" fill="white" fill-opacity="0.4"/>
</svg>
