<%+AdGuardHome/head%>
<%+cbi/valueheader%>
<script src="/luci-static/resources/codemirror/lib/codemirror.js"></script>
<link rel="stylesheet" href="/luci-static/resources/codemirror/lib/codemirror.css"/>
<script src="/luci-static/resources/codemirror/mode/yaml/yaml.js"></script>
<link rel="stylesheet" href="/luci-static/resources/codemirror/theme/dracula.css"/>
<link rel="stylesheet" href="/luci-static/resources/codemirror/addon/fold/foldgutter.css"/>
<script src="/luci-static/resources/codemirror/addon/fold/foldcode.js"></script>
<script src="/luci-static/resources/codemirror/addon/fold/foldgutter.js"></script>
<script src="/luci-static/resources/codemirror/addon/fold/indent-fold.js"></script>
<script type="text/javascript">//<![CDATA[
var editor = null;
try {
	if (typeof CodeMirror !== 'undefined') {
		editor = CodeMirror.fromTextArea(document.getElementById("cbid.AdGuardHome.AdGuardHome.escconf"), {
			mode: "text/yaml",
			styleActiveLine: true,
			lineNumbers: true,
			theme: "dracula",
			lineWrapping: true,
			foldGutter: true,
			gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
			matchBrackets: true
		});
	}
} catch (e) {
	console.warn('CodeMirror init skipped:', e);
}
function reload_config(){
	XHR.get('<%=url([[admin]], [[services]], [[AdGuardHome]], [[reloadconfig]])%>', null,
	function(x, data) {
	location.reload();
	});}
function use_template(){
	if (!confirm("<%:即将用模板覆盖当前 YAML，未保存的修改将丢失，是否继续？%>")) return;
	XHR.get('<%=url([[admin]], [[services]], [[AdGuardHome]], [[gettemplateconfig]])%>', null,
	function(x, data) {
		if (editor) editor.setValue(x.responseText);
		else document.getElementById("cbid.AdGuardHome.AdGuardHome.escconf").value = x.responseText;
	});}

// Confirm before "保存并应用" / "保存" on the manual page.
// Buttons are rendered after this script by LuCI form footer, so we
// poll for them and wrap their inline onclick handlers.
(function () {
	var msg = "<%:即将覆盖 AdGuardHome.yaml，请确认已备份配置。继续保存？%>";
	function wrap() {
		var targets = document.querySelectorAll('.cbi-button-save, .cbi-button-apply');
		var wrapped = 0;
		targets.forEach(function (btn) {
			if (btn.__adgWrapped) return;
			btn.__adgWrapped = true;
			wrapped++;
			var original = btn.onclick;
			btn.onclick = function (ev) {
				if (!confirm(msg)) {
					if (ev) ev.preventDefault();
					return false;
				}
				if (typeof original === 'function') return original.call(btn, ev);
			};
		});
		return wrapped;
	}
	var attempts = 0;
	var iv = setInterval(function () {
		attempts++;
		if (wrap() > 0 || attempts > 40) clearInterval(iv);
	}, 100);
})();
//]]>
</script> 
<%fs=require"nixio.fs"%>
<%if fs.access("/tmp/AdGuardHometmpconfig.yaml") then%>
<input type="button" id="apply_update_button" value="<%:Reload Config%>" onclick=" return reload_config() "/>
<%end%>
<input type="button" id="template_button" value="<%:Use template%>" onclick=" return use_template() "/>
<%+cbi/valuefooter%>
