<%+cbi/valueheader%>
<%+AdGuardHome/head%>
<%+AdGuardHome/log_empty%>
<style>
.adg-log-controls {
	display: flex;
	flex-wrap: wrap;
	align-items: center;
	gap: 8px;
	margin-bottom: 6px;
}
.adg-log-controls label {
	display: inline-flex;
	align-items: center;
	gap: 3px;
	font-size: 13px;
	cursor: pointer;
}
.adg-log-controls input[type="checkbox"] {
	vertical-align: middle;
	height: auto;
	margin: 0;
}
.adg-log-pane {
	height: 60vh;
	min-height: 360px;
	overflow: auto;
	padding: 8px 10px;
	border: 1px solid rgba(0,0,0,.08);
	border-radius: 7px;
	background: #1a1d21;
	color: #cfd6df;
	font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
	font-size: 11.5px;
	line-height: 1.35 !important;
	white-space: pre-wrap;
	word-break: break-all;
	width: 100%;
}
.adg-log-pane .adg-line { padding: 0 4px; border-radius: 3px; display: block; }
.adg-log-pane .adg-info { color: #cfd6df; }
.adg-log-pane .adg-warn { color: #e8b95a; }
.adg-log-pane .adg-error { color: #ea7878; background: rgba(234,120,120,.06); }
.adg-log-pane .adg-debug { color: #7a8290; opacity: .7; }
body.dark .adg-log-pane { border-color: rgba(255,255,255,.1); }
</style>
<div class="adg-log-controls">
	<label><input type="checkbox" value="reverse" onclick="return reverselog()" checked><%:reverse%></input></label>
	<%if self.timereplace then%>
	<label><input type="checkbox" value="localtime" onclick="return chlogtime()" checked><%:localtime%></input></label>
	<%end%>
</div>
<pre id="cbid.logview.1.conf" class="adg-log-pane" style="line-height:1.35 !important"></pre>
<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">
	<input type="button" class="btn cbi-button cbi-button-apply" id="apply_update_button" value="<%:dellog%>" onclick="return apply_del_log()"/>
	<input type="button" class="btn cbi-button cbi-button-apply" value="<%:download log%>" onclick="return download_log()"/>
</div>
<script type="text/javascript">//<![CDATA[
var islogreverse = true;
var isutc2local = <%=tostring(self.timereplace)%>;

function hlLine(ln) {
	var cls = '';
	var l = ln.toLowerCase();
	if (l.indexOf('error') >= 0 || l.indexOf('fatal') >= 0 || l.indexOf('panic') >= 0) cls = 'adg-error';
	else if (l.indexOf('warn') >= 0) cls = 'adg-warn';
	else if (l.indexOf('debug') >= 0 || l.indexOf('trace') >= 0) cls = 'adg-debug';
	else cls = 'adg-info';
	return '<span class="adg-line ' + cls + '">' + ln.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</span>';
}
function hlLines(text) {
	return text.split('\n').map(hlLine).join('');
}

function createAndDownloadFile(fileName, content) {
	var aTag = document.createElement('a');
	var blob = new Blob([content]);
	aTag.download = fileName;
	aTag.href = URL.createObjectURL(blob);
	aTag.click();
	URL.revokeObjectURL(blob);
}
function download_log(){
	var lv = document.getElementById('cbid.logview.1.conf');
	var dt = new Date();
	var timestamp = (dt.getMonth()+1)+"-"+dt.getDate()+"-"+dt.getHours()+"_"+dt.getMinutes();
	createAndDownloadFile("AdGuardHome"+timestamp+".log",lv.textContent)
	return
}
function apply_del_log(){
	XHR.get('<%=url([[admin]], [[services]], [[AdGuardHome]], [[dodellog]])%>',null,function(x, data){
	var lv = document.getElementById('cbid.logview.1.conf');
		lv.innerHTML="";
	}
		);
	return
}
function chlogtime(){
	var lv = document.getElementById('cbid.logview.1.conf');
	var text = lv.textContent;
	if (isutc2local){
	lv.innerHTML = hlLines(line_toUTC(text).join('\n'));
	isutc2local=false;
	}else{
	lv.innerHTML = hlLines(line_tolocal(text).join('\n'));
	isutc2local=true;
	}
	return
}
function reverselog(){
	var lv = document.getElementById('cbid.logview.1.conf');
	lv.innerHTML = lv.textContent.split('\n').reverse().map(hlLine).join('');
	if (islogreverse){
	islogreverse=false;
	}else{
	islogreverse=true;
	}
	return
}
function p(s) {
	return s < 10 ? '0' + s: s;
}
function line_tolocal(str){
var strt=new Array();
str.trim().split('\n').forEach(function(v, i) {
var dt = new Date(v.substring(0,19)+" UTC");
if (dt != "Invalid Date"){
  strt[i]=dt.getFullYear()+"/"+p(dt.getMonth()+1)+"/"+p(dt.getDate())+" "+p(dt.getHours())+":"+p(dt.getMinutes())+":"+p(dt.getSeconds())+v.substring(19);
}else{
  strt[i]=v;}})
return strt
}
function line_toUTC(str){
var strt=new Array();
str.trim().split('\n').forEach(function(v, i) {
var dt = new Date(v.substring(0,19))
if (dt != "Invalid Date"){
  strt[i]=dt.getUTCFullYear()+"/"+p(dt.getUTCMonth()+1)+"/"+p(dt.getUTCDate())+" "+p(dt.getUTCHours())+":"+p(dt.getUTCMinutes())+":"+p(dt.getUTCSeconds())+v.substring(19);
}else{
  strt[i]=v;}})
return strt
}
function displayLog(text) {
	var lv = document.getElementById('cbid.logview.1.conf');
	if (!lv) return;
	if (isutc2local) {
		var lines = line_toUTC(text);
		if (islogreverse) lines = lines.reverse();
		text = lines.join('\n');
		text = line_tolocal(text).join('\n');
	} else if (islogreverse) {
		text = text.split('\n').reverse().join('\n');
	}
	lv.innerHTML = hlLines(text);
}
function poll_check(){
XHR.poll(3, '<%=url([[admin]], [[services]], [[AdGuardHome]], [[getlog]])%>', null,
	function(x, data) {
		var lv = document.getElementById('cbid.logview.1.conf');
		if (x.responseText && lv) {
			var text = x.responseText;
			if (isutc2local) {
				var lines = line_toUTC(text);
				if (islogreverse) lines = lines.reverse();
				text = lines.join('\n');
				text = line_tolocal(text).join('\n');
			} else if (islogreverse) {
				text = text.split('\n').reverse().join('\n');
			}
			if (islogreverse) {
				lv.innerHTML = hlLines(text) + lv.innerHTML;
			} else {
				lv.innerHTML += hlLines(text);
			}
		}
	}
);}
<%if self.pollcheck then%>
poll_check();
<%else%>
var lv = document.getElementById('cbid.logview.1.conf');
lv.innerHTML="<%:Please add log path in config to enable log%>"
<%end%>
//]]>
</script>
<%+cbi/valuefooter%>
