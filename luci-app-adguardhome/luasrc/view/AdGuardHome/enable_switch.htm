<%+AdGuardHome/head%>
<%+cbi/valueheader%>
<%
	local value = self:cfgvalue(section)
	local checked = value == "1"
	local field_id = cbid
%>
<style>
.adg-enable-wrap {
	display: inline-flex;
	align-items: center;
	gap: 10px;
	min-height: 30px;
}
.adg-service-switch {
	position: relative;
	width: 48px;
	height: 26px;
	border: 0;
	border-radius: 999px;
	background: rgba(128,128,128,.24);
	padding: 2px;
	box-shadow: none;
	cursor: pointer;
	vertical-align: middle;
	transition: background .18s ease, opacity .18s ease;
}
.adg-service-switch .adg-service-knob {
	position: absolute;
	top: 3px;
	left: 3px;
	width: 20px;
	height: 20px;
	border-radius: 50%;
	background: rgba(255,255,255,.94);
	box-shadow: 0 1px 4px rgba(0,0,0,.18);
	transition: transform .18s ease, background .18s ease;
}
.adg-service-switch.is-on {
	background: rgba(74,160,101,.52);
}
.adg-service-switch.is-on .adg-service-knob {
	transform: translateX(22px);
}
.adg-service-switch:disabled {
	opacity: .72;
	cursor: not-allowed;
}
.adg-enable-status {
	font-size: 12px;
	color: rgba(128,128,128,.86);
}
</style>
<div class="adg-enable-wrap">
	<input type="hidden" data-update="change"<%=attr("id", field_id) .. attr("name", field_id) .. attr("value", checked and "1" or "0")%> />
	<button type="button" class="adg-service-switch <%=checked and 'is-on' or 'is-off'%>"<%=attr("id", field_id .. ".switch") .. attr("aria-pressed", checked and "true" or "false")%> aria-label="<%:Enable%>">
		<span class="adg-service-knob"></span>
	</button>
	<span class="adg-enable-status"<%=attr("id", field_id .. ".status")%>></span>
</div>
<script type="text/javascript">//<![CDATA[
(function() {
	var hidden = document.getElementById('<%=field_id%>');
	var btn = document.getElementById('<%=field_id%>.switch');
	var status = document.getElementById('<%=field_id%>.status');
	var current = hidden && hidden.value === '1';
	var pollSerial = 0;

	function setState(on) {
		current = !!on;
		if (hidden)
			hidden.value = current ? '1' : '0';
		if (btn) {
			btn.className = 'adg-service-switch ' + (current ? 'is-on' : 'is-off');
			btn.setAttribute('aria-pressed', current ? 'true' : 'false');
		}
	}

	function notify(message) {
		if (window.L && L.ui && L.ui.addNotification) {
			var p = document.createElement('p');
			p.appendChild(document.createTextNode(message));
			L.ui.addNotification(null, p);
		} else {
			alert(message);
		}
	}

	function updateStatus(data) {
		var tb = document.getElementById('AdGuardHome_status');
		if (!data || !tb)
			return;

		if (data.running)
			tb.innerHTML = '<em><b><font color=green>AdGuardHome <%:RUNNING%></font></b></em>';
		else
			tb.innerHTML = '<em><b><font color=red>AdGuardHome <%:NOT RUNNING%></font></b></em>';

		if (data.redirect)
			tb.innerHTML += '<em><b><font color=green><%:Redirected%></font></b></em>';
		else
			tb.innerHTML += '<em><b><font color=red><%:Not redirect%></font></b></em>';
	}

	function pollTarget(target, serial, left) {
		XHR.get('<%=url([[admin]], [[services]], [[AdGuardHome]], [[status]])%>', null, function(_, statusData) {
			if (serial !== pollSerial)
				return;

			updateStatus(statusData);
			if (statusData && statusData.running === target) {
				if (status)
					status.innerHTML = '';
				return;
			}

			if (left <= 0) {
				setState(!target);
				if (status)
					status.innerHTML = '';
				notify(target ? '<%:AdGuardHome start failed%>' : '<%:AdGuardHome stop failed%>');
				return;
			}

			window.setTimeout(function() {
				pollTarget(target, serial, left - 1);
			}, 1000);
		});
	}

	if (!btn || !hidden)
		return;

	btn.onclick = function(ev) {
		if (ev)
			ev.preventDefault();

		var next = !current;
		var previous = current;
		var serial = ++pollSerial;
		setState(next);
		btn.disabled = true;
		if (status)
			status.innerHTML = next ? '<%:Starting...%>' : '<%:Stopping...%>';

		XHR.get('<%=url([[admin]], [[services]], [[AdGuardHome]], [[toggle]])%>', { enabled: next ? 1 : 0 }, function(x, data) {
			btn.disabled = false;

			if (data && data.success) {
				setState(data.enabled);
				pollTarget(next, serial, 12);
				return;
			}

			if (status)
				status.innerHTML = '';
			setState(previous);
			var fallback = '<%:Operation failed%>';
			if (x && x.status && x.status !== 200)
				fallback += ' (HTTP ' + x.status + ')';
			notify(data && data.message ? data.message : fallback);
		});

		return false;
	};
})();
//]]>
</script>
<%+cbi/valuefooter%>
